name: CI

on:
  pull_request:
  push:
    branches: [main]


jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=1
            pre-commit run --from-ref "origin/${{ github.base_ref }}" --to-ref "${{ github.sha }}" --show-diff-on-failure
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              pre-commit run --all-files --show-diff-on-failure
            else
              pre-commit run --from-ref "${{ github.event.before }}" --to-ref "${{ github.sha }}" --show-diff-on-failure
            fi
          fi

  yaml_lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint

      - name: Run yamllint
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' .
